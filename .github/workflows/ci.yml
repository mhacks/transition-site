name: CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  style-lint-build:
    name: Style, Lint, and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run Prettier
        run: bun run prettier --check .
        continue-on-error: true

      - name: Run ESLint
        run: bun run lint
        continue-on-error: true

      - name: Build the project
        run: bun run build
